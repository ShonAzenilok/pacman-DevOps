name: eks cluster provisioning
on:
  workflow_dispatch:
    inputs:
      action:
        description: "eksctl action to run"
        required: true
        type: choice
        options: [create, delete]

jobs:
  cluster:
    name: ${{ inputs.action }} EKS cluster
    runs-on: ubuntu-latest
    environment: eks-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install eksctl
        run: |
          curl -sL "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/eksctl /usr/local/bin

      - name: Create cluster
        if: inputs.action == 'create'
        run: eksctl create cluster -f ekscluster/cluster.yml

      - name: Delete cluster
        if: inputs.action == 'delete'
        run: eksctl delete cluster -f ekscluster/cluster.yml --wait
