name: eksworkflow
on:
  push:
    branches: [master]

jobs:
  build_and_push:
    name: build and push image to ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Confirm AWS account
        run: aws sts get-caller-identity

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push docker image to ECR
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: pacman
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REPOSITORY ./docker
          docker tag $REPOSITORY $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "image=$REGISTRY/$REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: deploy to EKS
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name pacman-cluster --region us-east-1

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Deploy/upgrade MongoDB
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm upgrade --install pacman-mongo bitnami/mongodb \
            --namespace pacman \
            -f k8s/mongodb-values.yaml \
            --set auth.rootPassword="${{ secrets.MONGO_ROOT_PASSWORD }}" \
            --set auth.password="${{ secrets.MONGO_APP_PASSWORD }}" \
            --wait --timeout 5m

      - name: Sync app secret
        run: |
          kubectl create secret generic pacman-mongo-auth \
            --namespace pacman \
            --from-literal=MONGO_AUTH_USER=pacman \
            --from-literal=MONGO_AUTH_PWD="${{ secrets.MONGO_APP_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy app
        env:
          IMAGE: ${{ needs.build_and_push.outputs.image }}
        run: |
          sed "s#IMAGE_PLACEHOLDER#$IMAGE#" k8s/app-deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/app-service.yaml
          kubectl rollout status deployment/pacman -n pacman --timeout=180s
