# Template only — do not commit real credentials.
# Create the real secret imperatively instead, e.g.:
#   kubectl create secret generic pacman-mongo-auth -n pacman \
#     --from-literal=MONGO_AUTH_USER=pacman \
#     --from-literal=MONGO_AUTH_PWD=<the password set in mongodb-values.yaml>
apiVersion: v1
kind: Secret
metadata:
  name: pacman-mongo-auth
  namespace: pacman
type: Opaque
stringData:
  MONGO_AUTH_USER: pacman
  MONGO_AUTH_PWD: CHANGE_ME
